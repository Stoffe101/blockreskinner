name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v, example: 0.6.0-beta.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "Version input is empty"
            exit 1
          fi
          if [[ "$VERSION" == v* ]]; then
            echo "Version must be entered without leading v"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build

      - name: Locate release jar
        shell: bash
        run: |
          mkdir -p release-assets

          mapfile -t JARS < <(find build/libs -maxdepth 1 -type f -name "*.jar" \
            ! -name "*sources*" \
            ! -name "*javadoc*" \
            ! -name "*dev*" \
            ! -name "*shadow*" \
            ! -name "*debug*" \
            ! -name "*remapped*" \
            | sort)

          if [ "${#JARS[@]}" -eq 0 ]; then
            echo "No release jar found in build/libs"
            exit 1
          fi

          if [ "${#JARS[@]}" -gt 1 ]; then
            echo "Multiple possible release jars found:"
            printf '%s\n' "${JARS[@]}"
            echo "Please make jar detection stricter."
            exit 1
          fi

          PROJECT_NAME="blockreskinner"
          ASSET="release-assets/${PROJECT_NAME}-${VERSION}.jar"
          cp "${JARS[0]}" "$ASSET"

          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Detect prerelease
        shell: bash
        run: |
          LOWER="$(echo "$VERSION" | tr '[:upper:]' '[:lower:]')"
          if [[ "$LOWER" == *alpha* || "$LOWER" == *beta* || "$LOWER" == *rc* || "$LOWER" == *pre* || "$LOWER" == *snapshot* ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ env.PRERELEASE }}
          generate_release_notes: true
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

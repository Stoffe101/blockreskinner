name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v, example: 0.6.0-beta.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate version input
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Version input must not be empty." >&2
            exit 1
          fi
          if [[ "$VERSION" == v* ]]; then
            echo "Version input must not start with v. Enter values like 0.6.0-beta.2." >&2
            exit 1
          fi
          if [[ "$VERSION" =~ (alpha|beta|rc|pre|snapshot) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build
        run: ./gradlew clean build

      - name: Locate release jar
        id: jar
        shell: bash
        run: |
          shopt -s nullglob
          candidates=()
          for jar in build/libs/*.jar; do
            name="$(basename "$jar")"
            case "$name" in
              *-sources.jar|*-javadoc.jar|*-dev.jar|*-all.jar|*-shadow.jar|*-remapped.jar)
                ;;
              *)
                candidates+=("$jar")
                ;;
            esac
          done

          if [[ "${#candidates[@]}" -eq 0 ]]; then
            echo "No normal mod jar found in build/libs." >&2
            exit 1
          fi
          if [[ "${#candidates[@]}" -gt 1 ]]; then
            echo "Multiple possible normal mod jars found:" >&2
            printf ' - %s\n' "${candidates[@]}" >&2
            exit 1
          fi

          mkdir -p release-assets
          asset="release-assets/blockreskinner-${{ steps.version.outputs.version }}.jar"
          cp "${candidates[0]}" "$asset"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          args=(
            release create "${{ steps.version.outputs.tag }}"
            "${{ steps.jar.outputs.asset }}"
            --title "${{ steps.version.outputs.tag }}"
            --target "$GITHUB_SHA"
            --notes "Block Reskinner ${{ steps.version.outputs.tag }}"
          )
          if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
